name: Scraper

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important: Fetches history so rebase works

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated files (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage files
          git add *.m3u* *.json *.xml 2>/dev/null || true

          if ! git diff --cached --quiet; then
            git commit -m "Update – $(date -u +'%Y-%m-%d %H:%M UTC')"
            
            # Fix: Pull latest changes and rebase before pushing
            git pull --rebase origin main
            
            git push
          else
            echo "No changes detected – skipping commit"
          fi
